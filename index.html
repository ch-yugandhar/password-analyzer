<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Client-side password strength analyzer powered by zxcvbn. Detects dictionary words, keyboard walks, leet substitutions, and more. No data leaves your browser." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%90%3C/text%3E%3C/svg%3E" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1c1c1a" media="(prefers-color-scheme: dark)" />
  <title>Password Analyzer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="root">
    <div class="header">
      <h1>Password analyzer</h1>
      <span class="badge">security tool</span>
      <span class="zxcvbn-badge">zxcvbn engine</span>
    </div>

    <div class="input-wrap">
      <input
        class="pwd-input"
        id="pwd"
        type="password"
        placeholder="Enter password to analyze..."
        oninput="analyze(this.value)"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      />
      <button class="eye-btn" type="button" onclick="toggleEye()" aria-label="Toggle password visibility">
        <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div id="out">
      <div class="empty">
        <div class="empty-mono">?*#!</div>
        <p>Type a password above to analyze</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/zxcvbn@4.4.2/dist/zxcvbn.js"></script>
  <script src="analyzer.js"></script>
</body>
</html>
